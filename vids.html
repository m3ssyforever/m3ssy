<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEOS - MESSY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff0066;
            --secondary: #00ff88;
            --dark: #0a0a0a;
            --light: #f0f0f0;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            z-index: 100;
            background-color: var(--dark);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 2px 2px var(--primary), -2px -2px var(--secondary); }
            25% { text-shadow: -2px 2px var(--secondary), 2px -2px var(--primary); }
            50% { text-shadow: 2px -2px var(--primary), -2px 2px var(--secondary); }
            75% { text-shadow: -2px -2px var(--secondary), 2px 2px var(--primary); }
        }

        /* Hero Section */
        .hero {
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            width: 300%;
            height: 300%;
            background:
                radial-gradient(circle at 10% 20%, #ff0066 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #00ff88 0%, transparent 40%),
                radial-gradient(circle at 40% 40%, #ffff00 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, #ff00ff 0%, transparent 40%);
            animation: rotate 8s linear infinite;
            opacity: 0.15;
            filter: blur(40px) contrast(1.5) saturate(1.5);
            mix-blend-mode: screen;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 1;
        }

        .hero h1 {
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            background: linear-gradient(135deg, var(--light), var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 3s infinite;
        }

        /* Videos Section */
        .videos-section {
            padding: 100px 50px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
            background-color: var(--dark);
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
        }

        .section-title::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: slide 3s ease-in-out infinite;
        }

        @keyframes slide {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 102, 0.3), transparent);
            transition: left 0.5s ease;
            z-index: 1;
            pointer-events: none;
        }

        .video-card:hover::before {
            left: 100%;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 0, 102, 0.3);
        }

        .video-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-info {
            padding: 15px;
            font-size: 0.6rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--secondary);
            color: var(--dark);
            transform: translateX(-5px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 50px;
            background: var(--dark);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            font-size: 0.6rem;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
            
            nav {
                padding: 20px;
            }

            .videos-section {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <div class="logo">MESSY</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>VIDEOS</h1>
        </div>
    </section>

    <!-- Videos Section -->
    <section class="videos-section">
        <a href="index.html" class="back-link">← BACK TO HOME</a>
        
        <div class="videos-grid">
            <!-- Video 1 -->
            <div class="video-card">
                <div class="video-header">BETTER OFF ALONE</div>
                <div class="video-wrapper">
                    <iframe
                        src="https://iframe.mediadelivery.net/play/590500/a770f957-5cb2-4d41-8d5f-994978cf8538"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p class="footer-text">© 2025 MESSY • Booking: choreboys@gmail.com</p>
    </footer>

    <script>
        // Parallax effect on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const heroBg = document.querySelector('.hero-bg');
            if (heroBg) {
                heroBg.style.transform = `translateY(${scrolled * 0.5}px) rotate(${scrolled * 0.1}deg)`;
            }
        });
    </script>
</body>
</html>
