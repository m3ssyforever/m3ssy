<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1f1f1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Strength">
<title>Strength Program</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface-2: #f1efeb;
    --text: #1f1f1f;
    --muted: #6b6b6b;
    --border: #e6e3dd;
    --accent: #2e7d5b;
    --accent-soft: #d8ece1;
    --accent-2: #1e3a5f;
    --warn: #b98907;
    --danger: #b3261e;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 20px rgba(0,0,0,.05);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #151514;
      --surface: #1f1f1e;
      --surface-2: #262624;
      --text: #eeecea;
      --muted: #a09d98;
      --border: #302f2d;
      --accent: #5ec089;
      --accent-soft: #234634;
      --accent-2: #6fa3d1;
      --warn: #d4a43c;
      --danger: #e08079;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, system-ui, sans-serif;
    font-size: 16px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding-bottom: env(safe-area-inset-bottom);
    overscroll-behavior-y: contain;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  a { color: var(--accent); }

  /* ---------- Header ---------- */
  header.app {
    position: sticky; top: 0; z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(env(safe-area-inset-top) + 10px) 14px 8px;
  }
  .app-title {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .app-title h1 { font-size: 19px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .menu-btn {
    width: 40px; height: 40px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .menu-btn:hover { background: var(--surface-2); color: var(--text); }

  .tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
    background: var(--surface-2); padding: 4px; border-radius: 12px;
  }
  .tab {
    text-align: center; padding: 8px 6px; border-radius: 9px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: background .15s, color .15s;
    line-height: 1.2;
  }
  .tab .tab-sub { display: block; font-size: 10px; font-weight: 500; opacity: .8; margin-top: 2px; }
  .tab.active {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow);
  }

  .day-pills {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    margin-top: 8px;
    background: var(--surface-2); padding: 4px; border-radius: 12px;
  }
  .day-pill {
    text-align: center; padding: 8px 4px; border-radius: 9px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: background .15s, color .15s;
    line-height: 1.15;
  }
  .day-pill .day-sub { display: block; font-size: 10px; font-weight: 500; opacity: .75; margin-top: 2px; }
  .day-pill.active { background: var(--accent); color: #fff; }
  .day-pill .check { color: #fff; font-size: 11px; margin-left: 3px; }
  .day-pill:not(.active) .check { color: var(--accent); }

  /* ---------- Main ---------- */
  main { padding: 12px 12px 80px; max-width: 760px; margin: 0 auto; }

  .phase-intro {
    background: var(--surface);
    border: 1px solid var(--border); border-left: 4px solid var(--warn);
    border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 12px;
    font-size: 14px; color: var(--text);
  }
  .phase-intro strong { color: var(--warn); }

  .notice {
    background: var(--surface);
    border: 1px solid var(--border); border-left: 4px solid var(--danger);
    border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 12px;
    font-size: 13px; color: var(--text);
  }
  .notice strong { color: var(--danger); }

  .week-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin-bottom: 14px;
  }
  .week-cell {
    text-align: center; padding: 10px 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-size: 13px; font-weight: 600; color: var(--muted);
  }
  .week-cell:active { background: var(--surface-2); }
  .week-cell .wk-sub { display: block; font-size: 11px; font-weight: 500; opacity: .8; margin-top: 2px; }
  .week-cell.active { border-color: var(--accent-2); color: var(--text); }
  .week-cell.done { background: var(--accent-soft); color: var(--text); border-color: transparent; }
  .week-cell.done .wk-sub { color: var(--accent); }

  .day-meta {
    color: var(--muted); font-size: 13px; margin: 4px 0 12px;
  }

  .block { margin-bottom: 14px; }
  .block-title {
    color: var(--muted); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 700;
    padding: 4px 6px 6px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .block-title .block-count { font-weight: 500; }

  .ex-list {
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: grid; gap: 1px;
  }

  .ex-row {
    display: flex; gap: 12px; padding: 12px 14px;
    background: var(--surface);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s;
    align-items: flex-start;
  }
  .ex-row:active { background: var(--surface-2); }
  .ex-row.done { background: var(--accent-soft); }
  .ex-row .check {
    flex: 0 0 22px; width: 22px; height: 22px;
    border-radius: 50%; border: 2px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .ex-row.done .check { background: var(--accent); border-color: var(--accent); }
  .ex-row.done .check svg { display: block; }
  .ex-row .check svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 3; fill: none; display: none; }

  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-weight: 600; font-size: 16px; line-height: 1.3; }
  .ex-sets { color: var(--accent-2); font-size: 13px; font-weight: 600; margin-top: 2px; }
  .ex-desc { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .ex-desc.collapsed {
    display: -webkit-box; -webkit-box-orient: vertical;
    -webkit-line-clamp: 2; overflow: hidden;
  }
  .ex-desc .more {
    color: var(--accent); font-weight: 600; cursor: pointer;
    display: inline-block; margin-left: 4px;
  }
  .ex-cue { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 4px; }

  .session-footer {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    margin-top: 16px;
  }
  .session-footer .left { font-size: 14px; color: var(--muted); }
  .session-footer .left .num { font-weight: 700; color: var(--text); }
  .session-footer button {
    background: var(--accent); color: #fff;
    padding: 10px 14px; border-radius: 10px;
    font-weight: 600; font-size: 14px;
  }
  .session-footer button.undo {
    background: var(--surface-2); color: var(--text);
  }

  /* ---------- Menu ---------- */
  .menu {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 50px);
    right: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 6px;
    z-index: 40;
    min-width: 240px;
    display: none;
  }
  .menu.open { display: block; }
  .menu button {
    width: 100%; text-align: left;
    padding: 10px 12px; border-radius: 8px;
    font-size: 15px;
    display: flex; align-items: center; gap: 10px;
  }
  .menu button:hover { background: var(--surface-2); }
  .menu button .sub { color: var(--muted); font-size: 12px; margin-left: auto; }
  .menu hr { border: 0; border-top: 1px solid var(--border); margin: 4px 0; }
  .menu .icon { width: 18px; height: 18px; flex: 0 0 18px; color: var(--muted); }

  /* ---------- Sheet ---------- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 30;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 14px 16px calc(20px + env(safe-area-inset-bottom));
    z-index: 31;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.2,.7,.2,1);
    max-width: 720px; margin: 0 auto;
    box-shadow: 0 -8px 28px rgba(0,0,0,.18);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 12px;
  }
  .sheet h3 { margin: 0 0 12px; font-size: 17px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .field label { font-size: 13px; color: var(--muted); }
  .field input {
    padding: 11px 12px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface-2);
    outline: none; font-size: 16px;
  }
  .field input:focus { border-color: var(--accent); }
  .weight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .progress-block {
    background: var(--surface-2); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 12px; font-size: 14px;
  }
  .progress-block .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .progress-block .row .v { font-weight: 700; }
  .progress-bar {
    width: 100%; height: 6px; background: var(--border);
    border-radius: 99px; overflow: hidden; margin-top: 6px;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .sheet .buttons { display: flex; gap: 8px; margin-top: 4px; }
  .sheet .buttons button {
    flex: 1; padding: 12px; border-radius: 10px; font-weight: 600;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface-2); color: var(--text); }
  .btn-danger { background: var(--danger); color: #fff; }

  .toast {
    position: fixed; left: 50%;
    bottom: calc(20px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--surface);
    padding: 10px 16px; border-radius: 99px;
    font-size: 14px; box-shadow: var(--shadow);
    opacity: 0; transition: opacity .2s, transform .2s;
    z-index: 50; pointer-events: none; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type=file] { display: none; }
</style>
</head>
<body>

<header class="app">
  <div class="app-title">
    <h1 id="appTitle">Strength · P1</h1>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
    </button>
  </div>
  <nav class="tabs" id="phaseTabs" role="tablist"></nav>
  <nav class="day-pills" id="dayPills"></nav>
</header>

<main id="main"></main>

<!-- Menu -->
<div class="menu" id="menu">
  <button id="syncStatusBtn" style="pointer-events:none">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19A9 9 0 1 0 3 13.3"/><path d="M3 21v-5h5"/></svg>
    <span id="syncStatusText">Connecting…</span>
  </button>
  <hr>
  <button id="weightBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/></svg>
    <span>Weight tracking</span>
    <span class="sub" id="weightSub"></span>
  </button>
  <button id="overviewBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
    <span>Program overview</span>
  </button>
  <hr>
  <button id="exportBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
    <span>Export backup</span>
  </button>
  <button id="importBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/></svg>
    <span>Import backup</span>
  </button>
  <input type="file" id="importFile" accept=".json,application/json">
  <hr>
  <button id="resetBtn" style="color:var(--danger);">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    <span>Reset all progress…</span>
  </button>
</div>

<!-- Weight sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="weightSheet">
  <div class="sheet-handle"></div>
  <h3>Weight tracking</h3>
  <div class="progress-block">
    <div class="row"><span>Lost so far</span><span class="v" id="weightLost">0 lb</span></div>
    <div class="row"><span>To goal</span><span class="v" id="weightRemain">15 lb</span></div>
    <div class="progress-bar"><div class="progress-fill" id="weightFill" style="width:0%"></div></div>
  </div>
  <div class="weight-grid">
    <div class="field"><label>Start</label><input type="number" id="startWt" inputmode="decimal"></div>
    <div class="field"><label>Current</label><input type="number" id="currWt" inputmode="decimal"></div>
    <div class="field"><label>Goal</label><input type="number" id="goalWt" inputmode="decimal"></div>
  </div>
  <div class="buttons">
    <button class="btn-ghost" id="weightCancel">Cancel</button>
    <button class="btn-primary" id="weightSave">Save</button>
  </div>
</div>

<!-- Overview sheet -->
<div class="sheet" id="overviewSheet">
  <div class="sheet-handle"></div>
  <h3>Program overview</h3>
  <div id="overviewBody" style="font-size:14px; line-height:1.55; max-height:60vh; overflow-y:auto; padding-bottom:8px;"></div>
  <div class="buttons">
    <button class="btn-ghost" id="overviewClose">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import {
  initializeFirestore,
  persistentLocalCache,
  persistentMultipleTabManager,
  doc, setDoc, onSnapshot, serverTimestamp

(async () => {
  'use strict';

  // ========================================================================
  // PROGRAM DATA — 3 phases × 4 days × 4 weeks
  // Schedule: Mon (lower) · Tue (tai chi) · Thu (upper) · Sat (active)
  // ========================================================================
  const PROGRAM = {
    phases: [
      {
        id: "p1",
        name: "Phase 1 · Foundation",
        weeks: "Weeks 1–4",
        intro: "Goal: wake up the core, restore thoracic and hip mobility, and let your shoulder learn that strength training feels good. Loads are intentionally light — you're earning the right to add weight. RPE should sit at 5–6 out of 10.",

              { name: "Scapular wall slide", sets: "2 × 10", cue: "Forearms on wall, slide up & down with control." },
              { name: "Cat-cow", sets: "10 reps", cue: "" }

            { title: "Main strength (25 min) — no overhead", items: [
              { name: "Incline push-up (bar at hip height)", sets: "3 × 8", cue: "Body straight, lower with control. Higher bar = easier." },
              { name: "Chest-supported DB row", sets: "3 × 10", cue: "Elbow to hip, squeeze upper back. Stop if shoulder talks back." },
              { name: "Half-kneeling single-arm landmine press (light)", sets: "2 × 8/side", cue: "Press at an angle — much friendlier than overhead." },

            ]},
            { title: "Core finisher (8 min)", items: [
              { name: "Dead bug", sets: "3 × 8/side", cue: "" },
              { name: "Suitcase carry (one DB, walk 20 yds)", sets: "3 trips/side", cue: "Don't lean — anti-lateral-flexion core work." },
              { name: "Hollow hold (bent knees)", sets: "3 × 15 sec", cue: "" }

            { title: "Cooldown (5 min)", items: [

          { name: "Active Saturday (pick one)", when: "Saturday", blocks: [

            { title: "Option B — Jog & shoot (45 min)", items: [

    "Free throws": "Develop a routine — same dribbles, same breath, same release. Hold the follow-through until the ball hits the rim.",
    "Free throws when tired (game simulation)": "Same form, but after a hard run when your legs are heavy. This is what game free throws feel like.",
    "Spot shooting (5 spots)": "5 spots around the perimeter (left corner, left wing, top of key, right wing, right corner). Make a target from each.",
    "Catch-and-shoot off self-pass": "12–15 ft from the basket. Toss the ball out with backspin, jog to catch on the rise, plant inside foot, square up, shoot.",
    "1-on-0 moves": "Menu of moves without a defender: jab-step pull-up, drive-and-finish, step-back jumper, hesitation crossover. Half-speed first.",

    "Walk-jog intervals": "Alternate short jog segments with longer walk recovery. Conversational pace on the jog. Walk segments are part of the training, not a failure. How to reintroduce impact at 200 lb without inflaming joints.",
    "Jog intervals": "Longer jog segments (5+ min continuous) with shorter walk breaks. Conversational pace. Cardio engine is ready before joints — respect the joints.",
    "Continuous jog": "Steady easy run, 20–25 min, no walk breaks. Nasal breathing = right pace. Add 1–2 min per week.",

    "Thread the needle, 90/90, wall slides": "Cycle through the three drills. 8–10 reps each, 2 rounds total.",
    "Band pull-aparts, face pulls, scap push-up": "Three shoulder-prep movements (see individual entries). 10 each, 2 rounds.",
    "Band pull-apart, scap wall slide, prone Y-T-W": "Three shoulder/upper-back warm-up drills. 10 each, 2 rounds.",
    "Thoracic + hip flow": "Favorite thoracic and hip mobility drills from earlier phases — thread the needle, 90/90, world's greatest stretch, wall slides. Two rounds, no rush."
  };

  // Day-of-week → day-index in PROGRAM (Mon=0, Tue=1, Thu=2, Sat=3)
  const DAY_TO_INDEX = { 1: 0, 2: 1, 4: 2, 6: 3 };

  function lookupDesc(name) {
    if (EXERCISE_LIB[name]) return EXERCISE_LIB[name];
    const stripped = name.replace(/\s*\(.+?\)\s*$/, "").trim();
    return EXERCISE_LIB[stripped] || null;
  }

  // ========================================================================
  // FIREBASE — same project as the shopping list; new collection.
  // After deploying, update Firestore rules to allow /fitness/{listId}:
  //   match /fitness/{listId} { allow read, write: if true; }
  // ========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCg-b13sTdv5XDm5kLRZYO4K7zuthwL0V0",
    authDomain: "shopping-list-87b5d.firebaseapp.com",
    projectId: "shopping-list-87b5d",
    storageBucket: "shopping-list-87b5d.firebasestorage.app",
    messagingSenderId: "992821670697",
    appId: "1:992821670697:web:5b81530becfb56aa233d38"
  };
  const LIST_ID = 'messy-forever-fitness-x7q3';

  const fbApp = initializeApp(firebaseConfig);
  let db;
  try {
    db = initializeFirestore(fbApp, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });
  } catch (e) {
    const { getFirestore } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
    db = getFirestore(fbApp);
  }

  const CLIENT_KEY = 'fitnessClientId_v1';
  const CLIENT_ID = (() => {
    let id = localStorage.getItem(CLIENT_KEY);
    if (!id) { id = 'c_' + Math.random().toString(36).slice(2, 10); localStorage.setItem(CLIENT_KEY, id); }
    return id;
  })();
  const docRef = doc(db, 'fitness', LIST_ID);

  // ========================================================================
  // STATE
  // ========================================================================
  const STORAGE_KEY = 'fitnessState_v1';
  const UI_KEY = 'fitnessUI_v1';

  function defaultState() {
    return {
      version: 1,
      weight: { start: 200, current: 200, goal: 185 },
      sessions: {}  // key = `${phaseId}_d${dayIdx}_w${week}` -> { exercises: { [name]: true }, completed: bool }
    };
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const p = JSON.parse(raw);
      return Object.assign(defaultState(), p);
    } catch { return defaultState(); }
  }
  function defaultUI() {
    // Pick the day of week if it matches one of our training days
    const today = new Date().getDay();
    const dayIdx = DAY_TO_INDEX[today] ?? 0;
    return { phaseIdx: 0, dayIdx, weekIdx: 1, expandedDesc: {} };
  }
  function loadUI() {
    try {
      const raw = localStorage.getItem(UI_KEY);
      if (!raw) return defaultUI();
      return Object.assign(defaultUI(), JSON.parse(raw));
    } catch { return defaultUI(); }
  }
  function saveLocal() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { toast('Could not save — storage may be full'); }
  }
  function saveUI() {
    try { localStorage.setItem(UI_KEY, JSON.stringify(ui)); } catch {}
  }

  let state = loadState();
  let ui = loadUI();
  let applyingRemote = false;
  let hasEverSynced = false;
  let pendingSync = false;
  let syncTimer = null;

  function queueSync() {
    if (applyingRemote) return;
    if (!hasEverSynced) { pendingSync = true; return; }
    if (syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(doSync, 300);
  }
  async function doSync() {
    syncTimer = null;
    try {
      await setDoc(docRef, {
        version: state.version || 1,
        weight: state.weight,
        sessions: state.sessions,
        updatedBy: CLIENT_ID,
        updatedAt: serverTimestamp()
      });
      setSyncStatus('synced');
    } catch (e) {
      console.error('sync failed', e);
      setSyncStatus('offline');
    }
  }
  function save() { saveLocal(); queueSync(); }

  function setSyncStatus(kind) {
    const el = document.getElementById('syncStatusText');
    if (!el) return;
    if (kind === 'connecting') el.textContent = 'Connecting…';
    else if (kind === 'synced') el.textContent = 'Synced';
    else if (kind === 'offline') el.textContent = 'Offline — will sync when online';
  }
  setSyncStatus('connecting');

  onSnapshot(docRef, { includeMetadataChanges: false }, (snap) => {
    hasEverSynced = true;
    if (!snap.exists()) {
      setSyncStatus('synced');
      queueSync();  // seed remote with our local state
      return;
    }
    const data = snap.data();
    setSyncStatus('synced');
    if (data.updatedBy === CLIENT_ID) {
      if (pendingSync) { pendingSync = false; queueSync(); }
      return;
    }
    applyingRemote = true;
    state = {
      version: Number(data.version) || 1,
      weight: Object.assign({ start: 200, current: 200, goal: 185 }, data.weight || {}),
      sessions: (data.sessions && typeof data.sessions === 'object') ? data.sessions : {}
    };
    saveLocal();
    render();
    applyingRemote = false;
  }, (err) => {
    console.error('onSnapshot error', err);
    setSyncStatus('offline');
  });

  // ========================================================================
  // RENDERING
  // ========================================================================
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => [...r.querySelectorAll(s)];
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function sessionKey(p = ui.phaseIdx, d = ui.dayIdx, w = ui.weekIdx) {
    return `p${p}_d${d}_w${w}`;
  }
  function getSession(p, d, w) {
    return state.sessions[sessionKey(p, d, w)] || { exercises: {}, completed: false };
  }
  function ensureSession(p, d, w) {
    const k = sessionKey(p, d, w);
    if (!state.sessions[k]) state.sessions[k] = { exercises: {}, completed: false };
    return state.sessions[k];
  }
  function countDayExercises(phaseIdx, dayIdx) {
    return PROGRAM.phases[phaseIdx].days[dayIdx].blocks.reduce((n, b) => n + b.items.length, 0);
  }
  function countDoneInSession(p, d, w) {
    const s = getSession(p, d, w);
    return Object.values(s.exercises).filter(Boolean).length;
  }
  function isSessionComplete(p, d, w) {
    return getSession(p, d, w).completed === true;
  }

  function render() {
    renderPhaseTabs();
    renderDayPills();
    renderMain();
    renderTitle();
    renderWeightSub();
  }

  function renderTitle() {
    const p = PROGRAM.phases[ui.phaseIdx];
    $('#appTitle').textContent = `Strength · ${p.name.split('·')[0].trim()}`;
  }

  function renderPhaseTabs() {
    const el = $('#phaseTabs');
    el.innerHTML = PROGRAM.phases.map((p, i) => {
      const label = p.name.split('·')[1] ? p.name.split('·')[1].trim() : p.name;
      return `<button class="tab ${i === ui.phaseIdx ? 'active' : ''}" data-p="${i}">
        ${escapeHtml(label)}<span class="tab-sub">${escapeHtml(p.weeks)}</span>
      </button>`;
    }).join('');
    el.onclick = (e) => {
      const t = e.target.closest('.tab');
      if (!t) return;
      ui.phaseIdx = +t.dataset.p;
      saveUI(); render();
      window.scrollTo({ top: 0 });
    };
  }

  function renderDayPills() {
    const el = $('#dayPills');
    const days = PROGRAM.phases[ui.phaseIdx].days;
    el.innerHTML = days.map((d, i) => {
      const dayName = d.when.slice(0, 3);
      // Count weeks where session is complete for this day
      let completed = 0;
      for (let w = 1; w <= 4; w++) if (isSessionComplete(ui.phaseIdx, i, w)) completed++;
      const checkMark = completed > 0 ? `<span class="check">${completed}/4</span>` : '';
      return `<button class="day-pill ${i === ui.dayIdx ? 'active' : ''}" data-d="${i}">
        ${dayName}${checkMark}<span class="day-sub">${escapeHtml(d.name.split('+')[0].trim().split('(')[0].trim().split(' ').slice(0,2).join(' '))}</span>
      </button>`;
    }).join('');
    el.onclick = (e) => {
      const t = e.target.closest('.day-pill');
      if (!t) return;
      ui.dayIdx = +t.dataset.d;
      saveUI(); render();
      window.scrollTo({ top: 0 });
    };
  }

  function renderMain() {
    const phase = PROGRAM.phases[ui.phaseIdx];
    const day = phase.days[ui.dayIdx];
    const main = $('#main');

    const done = countDoneInSession(ui.phaseIdx, ui.dayIdx, ui.weekIdx);
    const total = countDayExercises(ui.phaseIdx, ui.dayIdx);
    const sessionDone = isSessionComplete(ui.phaseIdx, ui.dayIdx, ui.weekIdx);

    let html = `
      <div class="phase-intro">
        <strong>${escapeHtml(phase.weeks)}</strong> — ${escapeHtml(phase.intro)}
      </div>

      <div class="week-strip">
        ${[1,2,3,4].map(w => {
          const active = w === ui.weekIdx;
          const wDone = isSessionComplete(ui.phaseIdx, ui.dayIdx, w);
          const wDoneCount = countDoneInSession(ui.phaseIdx, ui.dayIdx, w);
          const wTotal = total;
          return `<button class="week-cell ${active ? 'active' : ''} ${wDone ? 'done' : ''}" data-w="${w}">
            Week ${w}<span class="wk-sub">${wDone ? '✓ done' : wDoneCount ? wDoneCount + '/' + wTotal : '—'}</span>
          </button>`;
        }).join('')}
      </div>

      <h2 style="margin:6px 6px 2px; font-size:18px;">${escapeHtml(day.name)}</h2>
      <div class="day-meta">${escapeHtml(day.when)} · ${escapeHtml(phase.weeks)} · Week ${ui.weekIdx}</div>
    `;

    if (ui.phaseIdx === 0 && ui.weekIdx === 1 && ui.dayIdx === 0) {
      html += `<div class="notice"><strong>Heads up:</strong> Right-scapula pain radiating into the arm deserves a one-time PT or sports-med evaluation before progressing past Phase 1. Stop any movement that reproduces the arm symptom.</div>`;
    }

    day.blocks.forEach((block, bi) => {
      const blockTotal = block.items.length;
      const blockDone = block.items.filter(it =>
        getSession(ui.phaseIdx, ui.dayIdx, ui.weekIdx).exercises[it.name]
      ).length;
      html += `
        <div class="block">
          <div class="block-title">
            <span>${escapeHtml(block.title)}</span>
            <span class="block-count">${blockDone}/${blockTotal}</span>
          </div>
          <div class="ex-list">
            ${block.items.map(it => exRowHtml(it, bi)).join('')}
          </div>
        </div>`;
    });

    html += `
      <div class="session-footer">
        <div class="left"><span class="num">${done}/${total}</span> exercises done${sessionDone ? ' · session ✓' : ''}</div>
        <button class="${sessionDone ? 'undo' : ''}" id="completeBtn">${sessionDone ? 'Undo' : 'Mark session done'}</button>
      </div>`;

    main.innerHTML = html;

    // Wire week strip
    $('.week-strip').onclick = (e) => {
      const t = e.target.closest('.week-cell');
      if (!t) return;
      ui.weekIdx = +t.dataset.w;
      saveUI(); render();
    };
    // Wire complete button
    $('#completeBtn').onclick = toggleSessionComplete;
    // Wire description expand
    $$('.ex-desc .more').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const key = el.dataset.key;
        ui.expandedDesc[key] = !ui.expandedDesc[key];
        saveUI(); render();
      };
    });
    // Wire row taps
    $$('.ex-row').forEach(row => {
      row.onclick = (e) => {
        // Don't toggle if user tapped a "More" link
        if (e.target.closest('.more')) return;
        const name = row.dataset.name;
        const sess = ensureSession(ui.phaseIdx, ui.dayIdx, ui.weekIdx);
        sess.exercises[name] = !sess.exercises[name];
        save(); render();
      };
    });
  }

  function exRowHtml(item, bi) {
    const sess = getSession(ui.phaseIdx, ui.dayIdx, ui.weekIdx);
    const done = !!sess.exercises[item.name];
    const desc = lookupDesc(item.name);
    const key = `${ui.phaseIdx}_${ui.dayIdx}_${bi}_${item.name}`;
    const expanded = !!ui.expandedDesc[key];
    const descHtml = desc ? `
      <div class="ex-desc ${expanded ? '' : 'collapsed'}">
        ${escapeHtml(desc)}${desc.length > 110 ? ` <span class="more" data-key="${escapeHtml(key)}">${expanded ? 'less' : 'more'}</span>` : ''}
      </div>` : '';
    const cueHtml = item.cue ? `<div class="ex-cue">${escapeHtml(item.cue)}</div>` : '';
    return `
      <div class="ex-row ${done ? 'done' : ''}" data-name="${escapeHtml(item.name)}">
        <div class="check">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="ex-body">
          <div class="ex-name">${escapeHtml(item.name)}</div>
          <div class="ex-sets">${escapeHtml(item.sets)}</div>
          ${descHtml}
          ${cueHtml}
        </div>
      </div>`;
  }

  function toggleSessionComplete() {
    const sess = ensureSession(ui.phaseIdx, ui.dayIdx, ui.weekIdx);
    sess.completed = !sess.completed;
    if (sess.completed) {
      // Mark every exercise as done too
      const day = PROGRAM.phases[ui.phaseIdx].days[ui.dayIdx];
      day.blocks.forEach(b => b.items.forEach(it => { sess.exercises[it.name] = true; }));
      toast('Session marked complete');
    } else {
      toast('Session reopened');
    }
    save(); render();
  }

  // ========================================================================
  // MENU
  // ========================================================================
  const menu = $('#menu');
  $('#menuBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && !e.target.closest('#menuBtn')) menu.classList.remove('open');
  });

  function renderWeightSub() {
    const lost = (state.weight.start - state.weight.current);
    $('#weightSub').textContent = lost > 0 ? `−${lost} lb` : '';
  }

  // ========================================================================
  // WEIGHT SHEET
  // ========================================================================
  const sheetBackdrop = $('#sheetBackdrop');
  const weightSheet = $('#weightSheet');
  const overviewSheet = $('#overviewSheet');

  function openWeightSheet() {
    $('#startWt').value = state.weight.start;
    $('#currWt').value  = state.weight.current;
    $('#goalWt').value  = state.weight.goal;
    updateWeightDisplay();
    menu.classList.remove('open');
    sheetBackdrop.classList.add('open');
    weightSheet.classList.add('open');
  }
  function closeSheets() {
    sheetBackdrop.classList.remove('open');
    weightSheet.classList.remove('open');
    overviewSheet.classList.remove('open');
  }
  function updateWeightDisplay() {
    const s = +$('#startWt').value || 0;
    const c = +$('#currWt').value || 0;
    const g = +$('#goalWt').value || 0;
    const lost = Math.max(0, s - c);
    const remain = Math.max(0, c - g);
    $('#weightLost').textContent = `${lost} lb`;
    $('#weightRemain').textContent = `${remain} lb`;
    const total = Math.max(1, s - g);
    const pct = Math.min(100, Math.round((lost / total) * 100));
    $('#weightFill').style.width = pct + '%';
  }
  ['startWt','currWt','goalWt'].forEach(id => $('#'+id).addEventListener('input', updateWeightDisplay));
  $('#weightBtn').addEventListener('click', openWeightSheet);
  $('#weightCancel').addEventListener('click', closeSheets);
  sheetBackdrop.addEventListener('click', closeSheets);
  $('#weightSave').addEventListener('click', () => {
    state.weight.start   = +$('#startWt').value || state.weight.start;
    state.weight.current = +$('#currWt').value  || state.weight.current;
    state.weight.goal    = +$('#goalWt').value  || state.weight.goal;
    save(); renderWeightSub(); closeSheets();
    toast('Weight saved');
  });

  // ========================================================================
  // OVERVIEW SHEET
  // ========================================================================
  function openOverview() {
    let totalSessions = 0, completedSessions = 0;
    for (let p = 0; p < PROGRAM.phases.length; p++) {
      for (let d = 0; d < PROGRAM.phases[p].days.length; d++) {
        for (let w = 1; w <= 4; w++) {
          totalSessions++;
          if (isSessionComplete(p, d, w)) completedSessions++;
        }
      }
    }
    let html = `<p style="margin:0 0 12px;"><strong>${completedSessions} of ${totalSessions}</strong> total sessions complete across the 12-week program.</p>`;
    PROGRAM.phases.forEach((p, pi) => {
      let phaseDone = 0;
      for (let d = 0; d < p.days.length; d++) for (let w = 1; w <= 4; w++) if (isSessionComplete(pi, d, w)) phaseDone++;
      html += `<div style="margin-bottom:14px;">
        <strong>${escapeHtml(p.name)}</strong> · ${phaseDone}/16
        <div style="margin-top:6px; font-size:13px; color:var(--muted);">${escapeHtml(p.intro)}</div>
        <div style="margin-top:8px; display:grid; grid-template-columns: 60px 1fr 1fr 1fr 1fr; gap:4px; font-size:12px;">
          <div></div>
          ${[1,2,3,4].map(w => `<div style="text-align:center; color:var(--muted);">W${w}</div>`).join('')}
          ${p.days.map((d, di) => {
            const dn = d.when.slice(0,3);
            return `<div style="color:var(--muted);">${dn}</div>` + [1,2,3,4].map(w => {
              const done = isSessionComplete(pi, di, w);
              const partial = countDoneInSession(pi, di, w) > 0;
              return `<div style="text-align:center; padding:4px; border-radius:4px;
                background:${done ? 'var(--accent)' : partial ? 'var(--accent-soft)' : 'var(--surface-2)'};
                color:${done ? '#fff' : 'var(--muted)'};">
                ${done ? '✓' : partial ? '·' : ''}
              </div>`;
            }).join('');
          }).join('')}
        </div>
      </div>`;
    });
    $('#overviewBody').innerHTML = html;
    menu.classList.remove('open');
    sheetBackdrop.classList.add('open');
    overviewSheet.classList.add('open');
  }
  $('#overviewBtn').addEventListener('click', openOverview);
  $('#overviewClose').addEventListener('click', closeSheets);

  // ========================================================================
  // EXPORT / IMPORT / RESET
  // ========================================================================
  $('#exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = `strength-program-backup-${stamp}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    menu.classList.remove('open');
  });
  $('#importBtn').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      if (!parsed.weight || !parsed.sessions) throw new Error('bad');
      state = {
        version: 1,
        weight: Object.assign({ start: 200, current: 200, goal: 185 }, parsed.weight),
        sessions: parsed.sessions || {}
      };
      save(); render();
      toast('Backup imported');
    } catch {
      toast('Import failed — not a valid backup');
    } finally {
      $('#importFile').value = '';
      menu.classList.remove('open');
    }
  });
  $('#resetBtn').addEventListener('click', () => {
    if (!confirm('Reset all session check-offs and weight tracking? This cannot be undone.')) return;
    state = defaultState();
    save(); render();
    menu.classList.remove('open');
    toast('All progress reset');
  });

  // ========================================================================
  // TOAST
  // ========================================================================
  let toastTimer;
  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ========================================================================
  // BOOT
  // ========================================================================
  saveLocal();
  render();
})();
</script>
</body>
</html>
